name: Deploy to Devnet (Public)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy to devnet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies
        run: sudo apt update && sudo apt install -y build-essential pkg-config libssl-dev

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: 1.90.0

      - name: Setup Anchor, Solana and Node
        uses: metadaoproject/setup-anchor@aeeb5505f3fd3d52a1080d14863c6aa428c9fdf9 # v3.4
        with:
          anchor-version: '0.31.1'
          solana-cli-version: '2.3.0'

      # Fix for https://github.com/solana-foundation/anchor/issues/3596
      - name: Manually download Anchor binary
        run: |
          curl -OL https://github.com/solana-foundation/anchor/releases/download/v0.31.1/anchor-0.31.1-x86_64-unknown-linux-gnu
          chmod +x anchor-0.31.1-x86_64-unknown-linux-gnu
          mv anchor-0.31.1-x86_64-unknown-linux-gnu $(which anchor)

      - name: Write deploy keypair
        env:
          DEPLOY_KEYPAIR: ${{ secrets.DEVNET_DEPLOY_KEYPAIR }}
        run: |
          echo "$DEPLOY_KEYPAIR" > /tmp/deploy-keypair.json
          chmod 600 /tmp/deploy-keypair.json

      - name: Generate Anchor.toml
        run: |
          cat > Anchor.toml << 'EOF'
          [toolchain]
          anchor_version = "0.31.1"
          solana_version = "2.3.0"

          [features]
          resolution = true
          skip-lint = false

          [provider]
          cluster = "devnet"
          wallet = "/tmp/deploy-keypair.json"
          EOF

      - name: Build all programs
        run: anchor build

      - name: Deploy to devnet
        run: anchor deploy --provider.cluster devnet --provider.wallet /tmp/deploy-keypair.json

      - name: Clean up keypair
        if: always()
        run: rm -f /tmp/deploy-keypair.json

      - name: Summary
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo ""
          echo "============================================================"
          echo "  Public devnet deploy complete"
          echo "  Commit : $(git rev-parse HEAD)"
          echo "  Tag    : ${REF_NAME}"
          echo ""
          echo "  Deployed programs:"
          for so in target/deploy/*.so; do
            name=$(basename "$so" .so)
            echo "    $name"
          done
          echo "============================================================"
